<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Time Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Inter, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.scene{
  width:900px;
  height:600px;
  position:relative;
  overflow:hidden;
  border-radius:20px;
  background:#000;
}

/* city buttons */
.city-toggle{
  position:absolute;
  top:15px;
  right:15px;
}

button{
  margin-left:5px;
  background:none;
  border:1px solid #555;
  color:#fff;
  padding:6px 10px;
  cursor:pointer;
  opacity:0.6;
}

button.active{
  opacity:1;
  border-color:#fff;
}

/* sun */
.sun{
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#ffd27a,#ff8c3a,transparent);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  transition:opacity 1s;
}

/* rain */
.rain{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  display:none;
}

.rain span{
  position:absolute;
  width:2px;
  height:20px;
  background:#8ecaff;
  animation:rain 1s linear infinite;
}

@keyframes rain{
  0%{transform:translateY(-100px);}
  100%{transform:translateY(600px);}
}

/* wind */
.wind{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  display:none;
}

.wind span{
  position:absolute;
  width:40px;
  height:2px;
  background:#aaa;
  animation:wind 2s linear infinite;
}

@keyframes wind{
  0%{transform:translateX(-100px);}
  100%{transform:translateX(1000px);}
}

.time{
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
  font-size:48px;
}
</style>
</head>

<body>

<div class="scene">

<div class="city-toggle">
  <button onclick="setCity('NY')" class="active">NY</button>
  <button onclick="setCity('LA')">LA</button>
  <button onclick="setCity('PARIS')">PARIS</button>
  <button onclick="setCity('SEOUL')">SEOUL</button>
  <button onclick="setCity('CHINA')">CHINA</button>
  <button onclick="setCity('INDIA')">INDIA</button>
</div>

<div id="sun" class="sun"></div>

<div id="rain" class="rain"></div>
<div id="wind" class="wind"></div>

<div id="time" class="time"></div>

</div>

<script>
const API_KEY = "YOUR_API_KEY_HERE";

let currentCity = "NY";

const cities = {
  NY: {name:"New York", tz:"America/New_York"},
  LA: {name:"Los Angeles", tz:"America/Los_Angeles"},
  PARIS: {name:"Paris", tz:"Europe/Paris"},
  SEOUL: {name:"Seoul", tz:"Asia/Seoul"},
  CHINA: {name:"Beijing", tz:"Asia/Shanghai"},
  INDIA: {name:"Delhi", tz:"Asia/Kolkata"}
};

const sun = document.getElementById("sun");
const rain = document.getElementById("rain");
const wind = document.getElementById("wind");
const timeEl = document.getElementById("time");

/* city switch */
function setCity(city){
  currentCity = city;

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  fetchWeather();
}

/* time */
function getTime(){
  return new Date(
    new Date().toLocaleString("en-US",{timeZone:cities[currentCity].tz})
  );
}

/* sun logic */
function getSunIntensity(h){
  if(h<6 || h>18) return 0;
  return 1 - Math.abs(h-12)/6;
}

/* weather fetch */
async function fetchWeather(){
  const cityName = cities[currentCity].name;

  const res = await fetch(
    `https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=${API_KEY}`
  );
  const data = await res.json();

  applyWeather(data.weather[0].main);
}

/* apply weather */
function applyWeather(type){
  rain.style.display = "none";
  wind.style.display = "none";

  if(type.includes("Rain")){
    rain.style.display = "block";
    rain.innerHTML="";
    for(let i=0;i<60;i++){
      let drop=document.createElement("span");
      drop.style.left=Math.random()*100+"%";
      drop.style.animationDuration=(0.5+Math.random())+"s";
      rain.appendChild(drop);
    }
  }

  if(type.includes("Wind")){
    wind.style.display="block";
    wind.innerHTML="";
    for(let i=0;i<20;i++){
      let line=document.createElement("span");
      line.style.top=Math.random()*100+"%";
      wind.appendChild(line);
    }
  }
}

/* update loop */
function update(){
  const t = getTime();
  const h = t.getHours();

  timeEl.innerText = t.toLocaleTimeString();

  sun.style.opacity = getSunIntensity(h);
}

fetchWeather();
setInterval(update,1000);
setInterval(fetchWeather,600000); // 10min refresh
</script>

</body>
</html>
