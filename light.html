<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Time Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Inter, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.scene{
  width:900px;
  height:600px;
  border-radius:24px;
  overflow:hidden;
  position:relative;
  background:linear-gradient(#0b0f1a,#000);
}

/* city */
.city{
  position:absolute;
  top:40px;
  left:40px;
  font-size:32px;
  font-weight:600;
}

/* time */
.time{
  position:absolute;
  top:100px;
  left:40px;
  font-size:72px;
  font-weight:800;
}

/* weather */
.weather{
  position:absolute;
  top:190px;
  left:40px;
  font-size:20px;
  opacity:0.7;
}

/* sun */
.sun{
  position:absolute;
  right:120px;
  top:120px;
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#ffd27a,#ff8c3a,transparent);
  opacity:0;
}

/* clouds */
.cloud{
  position:absolute;
  right:80px;
  top:150px;
  width:220px;
  height:120px;
  background:rgba(255,255,255,0.15);
  border-radius:60px;
  filter:blur(10px);
  opacity:0;
}

/* rain */
.rain{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
}

.rain span{
  position:absolute;
  width:2px;
  height:20px;
  background:#8ecaff;
  animation:rain 1s linear infinite;
}

@keyframes rain{
  0%{transform:translateY(-100px);}
  100%{transform:translateY(600px);}
}

/* toggle */
.toggle{
  position:absolute;
  bottom:20px;
  left:40px;
}

button{
  margin-right:6px;
  background:none;
  border:1px solid #555;
  color:#fff;
  padding:6px 10px;
  cursor:pointer;
  opacity:0.6;
}

button.active{
  opacity:1;
  border-color:#fff;
}
</style>
</head>

<body>

<div class="scene">

<div id="city" class="city"></div>
<div id="time" class="time"></div>
<div id="weather" class="weather"></div>

<div id="sun" class="sun"></div>
<div id="cloud" class="cloud"></div>
<div id="rain" class="rain"></div>

<div class="toggle">
  <button onclick="setCity('NY')" class="active">NY</button>
  <button onclick="setCity('LA')">LA</button>
  <button onclick="setCity('PARIS')">PARIS</button>
  <button onclick="setCity('SEOUL')">SEOUL</button>
  <button onclick="setCity('CHINA')">CHINA</button>
  <button onclick="setCity('INDIA')">INDIA</button>
</div>

</div>

<script>
const API_KEY = "YOUR_API_KEY";

let currentCity = "NY";

const cities = {
  NY:{name:"New York", tz:"America/New_York"},
  LA:{name:"Los Angeles", tz:"America/Los_Angeles"},
  PARIS:{name:"Paris", tz:"Europe/Paris"},
  SEOUL:{name:"Seoul", tz:"Asia/Seoul"},
  CHINA:{name:"Beijing", tz:"Asia/Shanghai"},
  INDIA:{name:"Delhi", tz:"Asia/Kolkata"}
};

const cityEl = document.getElementById("city");
const timeEl = document.getElementById("time");
const weatherEl = document.getElementById("weather");

const sun = document.getElementById("sun");
const cloud = document.getElementById("cloud");
const rain = document.getElementById("rain");

function setCity(city){
  currentCity = city;

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  fetchWeather();
}

/* time */
function getTime(){
  return new Date(
    new Date().toLocaleString("en-US",{timeZone:cities[currentCity].tz})
  );
}

/* weather */
async function fetchWeather(){
  const name = cities[currentCity].name;

  const res = await fetch(
    `https://api.openweathermap.org/data/2.5/weather?q=${name}&appid=${API_KEY}&units=metric`
  );

  const data = await res.json();

  const temp = Math.round(data.main.temp);
  const condition = data.weather[0].main;

  cityEl.innerText = name;
  weatherEl.innerText = `${condition} · ${temp}°`;

  renderWeather(condition);
}

/* render */
function renderWeather(type){
  sun.style.opacity = 0;
  cloud.style.opacity = 0;
  rain.style.display = "none";

  if(type === "Clear"){
    sun.style.opacity = 1;
  }
  else if(type === "Clouds"){
    cloud.style.opacity = 1;
  }
  else if(type === "Rain"){
    rain.style.display = "block";
    rain.innerHTML="";
    for(let i=0;i<80;i++){
      let drop=document.createElement("span");
      drop.style.left=Math.random()*100+"%";
      drop.style.animationDuration=(0.5+Math.random())+"s";
      rain.appendChild(drop);
    }
  }
}

/* update */
function update(){
  const t = getTime();
  timeEl.innerText = t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

fetchWeather();
setInterval(update,1000);
setInterval(fetchWeather,600000);
</script>

</body>
</html>
