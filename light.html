<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Time Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#020307;
  --fg:#f5f4f2;
  --muted:rgba(245,244,242,0.62);
}

body{
  min-height:100vh;
  background:var(--bg);
  color:var(--fg);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.scene{
  position:relative;
  width:100%;
  max-width:960px;
  min-height:620px;
  border-radius:28px;
  overflow:hidden;
  background:#000;
  box-shadow:0 40px 90px rgba(0,0,0,0.85);
}

/* subtitle */
.topline{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
}

.subtitle{
  font-size:14px;
  letter-spacing:0.26em;
  color:rgba(245,244,242,0.5);
}

/* city toggle */
.city-toggle{
  position:absolute;
  top:20px;
  right:20px;
  z-index:30;
}

.city-toggle button{
  background:none;
  border:1px solid rgba(255,255,255,0.2);
  color:var(--fg);
  padding:6px 10px;
  margin-left:6px;
  font-size:11px;
  cursor:pointer;
  opacity:0.6;
}

.city-toggle button.active{
  opacity:1;
  border-color:rgba(255,255,255,0.6);
}

/* 🌞 SUN */
.sun{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:200px;
  border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,220,140,1) 0%,
    rgba(255,170,80,0.6) 40%,
    rgba(0,0,0,0) 70%);
  opacity:0;
  transition:opacity 1s ease;
  filter:blur(8px);
}

/* content */
.content{
  position:absolute;
  bottom:86px;
  width:100%;
  text-align:center;
}

.context{
  font-size:11px;
  letter-spacing:0.24em;
  color:var(--muted);
  margin-bottom:12px;
}

.time{
  font-size:clamp(42px,6vw,62px);
  letter-spacing:0.07em;
  margin-bottom:16px;
}

.poem{
  max-width:640px;
  margin:0 auto;
  font-size:15px;
  line-height:1.7;
  color:rgba(245,244,242,0.9);
  white-space:pre-line;
  font-style:italic;
}
</style>
</head>

<body>

<div class="scene">

  <div class="topline">
    <div class="subtitle">Time Room</div>
  </div>

  <div class="city-toggle">
    <button onclick="setCity('NY')" class="active">NEW YORK</button>
    <button onclick="setCity('SEOUL')">SEOUL</button>
    <button onclick="setCity('LA')">LOS ANGELES</button>
    <button onclick="setCity('CHINA')">CHINA</button>
    <button onclick="setCity('INDIA')">INDIA</button>
  </div>

  <div id="sun" class="sun"></div>

  <div class="content">
    <div class="context">NEW YORK 24H</div>
    <div id="time" class="time">--:--:--</div>
    <div id="poem" class="poem"></div>
  </div>

</div>

<script>
const timeEl = document.getElementById("time");
const poemEl = document.getElementById("poem");
const sunEl = document.getElementById("sun");

let currentCity = "NY";

const TIMEZONES = {
  NY: "America/New_York",
  SEOUL: "Asia/Seoul",
  LA: "America/Los_Angeles",
  CHINA: "Asia/Shanghai",
  INDIA: "Asia/Kolkata"
};

function setCity(city){
  currentCity = city;

  document.querySelectorAll(".city-toggle button").forEach(btn=>{
    btn.classList.remove("active");
  });

  document.querySelector(`button[onclick="setCity('${city}')"]`)
    .classList.add("active");

  update();
}

function getTime(){
  return new Date(
    new Date().toLocaleString("en-US", {
      timeZone: TIMEZONES[currentCity]
    })
  );
}

/* ☀️ daylight intensity */
function getSunIntensity(hour){
  if(hour < 6 || hour > 18) return 0;

  const peak = 12;
  const distance = Math.abs(hour - peak);

  return 1 - (distance / 6);
}

function pad(n){return String(n).padStart(2,"0");}

function update(){
  const t = getTime();
  const h = t.getHours();

  timeEl.textContent =
    `${pad(h)}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;

  const intensity = getSunIntensity(h);
  sunEl.style.opacity = intensity;

  document.querySelector(".context").textContent =
    currentCity === "NY" ? "NEW YORK 24H" :
    currentCity === "SEOUL" ? "SEOUL 24H" :
    currentCity === "LA" ? "LOS ANGELES 24H" :
    currentCity === "CHINA" ? "CHINA 24H" :
    "INDIA 24H";
}

update();
setInterval(update,1000);
</script>

</body>
</html>
