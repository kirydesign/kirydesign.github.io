<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Time Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Inter, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.scene{
  width:900px;
  height:600px;
  position:relative;
  overflow:hidden;
  border-radius:20px;
  background:#000;
}

/* buttons */
.city-toggle{
  position:absolute;
  top:20px;
  right:20px;
}

button{
  margin-left:5px;
  background:none;
  border:1px solid #555;
  color:#fff;
  padding:6px 10px;
  cursor:pointer;
  opacity:0.6;
}

button.active{
  opacity:1;
  border-color:#fff;
}

/* sun */
.sun{
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#ffd27a,#ff8c3a,transparent);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
}

/* rain */
.rain{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  display:none;
}

.rain div{
  position:absolute;
  width:2px;
  height:18px;
  background:#8ecaff;
  animation:rain 1s linear infinite;
}

@keyframes rain{
  to{ transform:translateY(700px); }
}

/* cloud */
.cloud{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(8px);
  opacity:0;
}

/* time */
.time{
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
  font-size:48px;
}
</style>
</head>

<body>

<div class="scene">

<div class="city-toggle">
  <button onclick="setCity('NY')" class="active">NY</button>
  <button onclick="setCity('SEOUL')">SEOUL</button>
  <button onclick="setCity('LA')">LA</button>
  <button onclick="setCity('CHINA')">CHINA</button>
  <button onclick="setCity('INDIA')">INDIA</button>
</div>

<div id="sun" class="sun"></div>
<div id="cloud" class="cloud"></div>
<div id="rain" class="rain"></div>

<div id="time" class="time"></div>

</div>

<script>
const API_KEY = "e90186db9f1f3b5c5ce6ec44d813d71";

let currentCity = "SEOUL";

const cities = {
  NY:{name:"New York", tz:"America/New_York"},
  SEOUL:{name:"Seoul", tz:"Asia/Seoul"},
  LA:{name:"Los Angeles", tz:"America/Los_Angeles"},
  CHINA:{name:"Beijing", tz:"Asia/Shanghai"},
  INDIA:{name:"Delhi", tz:"Asia/Kolkata"}
};

const sun = document.getElementById("sun");
const rain = document.getElementById("rain");
const cloud = document.getElementById("cloud");
const timeEl = document.getElementById("time");

/* city */
function setCity(city){
  currentCity = city;

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  fetchWeather();
}

/* time */
function getTime(){
  return new Date(
    new Date().toLocaleString("en-US",{timeZone:cities[currentCity].tz})
  );
}

/* sun */
function getSunIntensity(h){
  if(h<6 || h>18) return 0;
  return 1 - Math.abs(h-12)/6;
}

/* weather */
async function fetchWeather(){
  try{
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${cities[currentCity].name}&appid=${API_KEY}&units=metric`
    );

    const data = await res.json();

    console.log("API RESPONSE:", data);

    if(data.cod !== 200){
      console.error("API ERROR:", data);
      return;
    }

    const type = data.weather[0].main;
    console.log("WEATHER TYPE:", type);

    applyWeather(type);

  }catch(e){
    console.error("FETCH ERROR:", e);
  }
}

/* render */
function applyWeather(type){

  rain.style.display = "none";
  cloud.style.opacity = 0;

  // 🔥 테스트용 (비 확인하려면 주석 해제)
  // type = "Rain";

  if(type === "Rain" || type === "Drizzle"){
    rain.style.display = "block";
    rain.innerHTML="";

    for(let i=0;i<100;i++){
      let d=document.createElement("div");
      d.style.left=Math.random()*100+"%";
      d.style.top="-20px";
      d.style.animationDuration=(0.5+Math.random())+"s";
      rain.appendChild(d);
    }
  }

  if(type === "Clouds"){
    cloud.style.opacity = 1;
  }
}

/* update */
function update(){
  const t = getTime();
  const h = t.getHours();

  timeEl.innerText = t.toLocaleTimeString();

  sun.style.opacity = getSunIntensity(h);
}

fetchWeather();
setInterval(update,1000);
setInterval(fetchWeather,600000);
</script>

</body>
</html>
