<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Time Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#020307;
  --fg:#f5f4f2;
  --muted:rgba(245,244,242,0.62);
}

body{
  min-height:100vh;
  background:var(--bg);
  color:var(--fg);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.scene{
  position:relative;
  width:100%;
  max-width:960px;
  min-height:620px;
  border-radius:28px;
  overflow:hidden;
  background:#000;
  box-shadow:0 40px 90px rgba(0,0,0,0.85);
}

.topline{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
}

.subtitle{
  font-size:14px;
  letter-spacing:0.26em;
  color:rgba(245,244,242,0.5);
}

.city-toggle{
  position:absolute;
  top:20px;
  right:20px;
  z-index:30;
}

.city-toggle button{
  background:none;
  border:1px solid rgba(255,255,255,0.2);
  color:var(--fg);
  padding:6px 10px;
  margin-left:6px;
  font-size:11px;
  cursor:pointer;
  opacity:0.6;
}

.city-toggle button.active{
  opacity:1;
  border-color:rgba(255,255,255,0.6);
}

/* ☀️ SUN */
.sun{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:200px;
  border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,220,140,1) 0%,
    rgba(255,170,80,0.6) 40%,
    rgba(0,0,0,0) 70%);
  opacity:0;
  transition:opacity 1s ease;
  filter:blur(8px);
}

/* 🌧 rain */
.rain{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  display:none;
}

.rain div{
  position:absolute;
  width:2px;
  height:18px;
  background:rgba(180,220,255,0.7);
  animation:rainFall linear infinite;
}

@keyframes rainFall{
  to{ transform:translateY(700px); }
}

/* ☁️ cloud */
.cloud{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  opacity:0;
  pointer-events:none;
}

.content{
  position:absolute;
  bottom:86px;
  width:100%;
  text-align:center;
}

.context{
  font-size:11px;
  letter-spacing:0.24em;
  color:var(--muted);
  margin-bottom:12px;
}

.time{
  font-size:clamp(42px,6vw,62px);
  letter-spacing:0.07em;
  margin-bottom:16px;
}
</style>
</head>

<body>

<div class="scene">

  <div class="topline">
    <div class="subtitle">Time Room</div>
  </div>

  <div class="city-toggle">
    <button onclick="setCity('NY')" class="active">NEW YORK</button>
    <button onclick="setCity('SEOUL')">SEOUL</button>
    <button onclick="setCity('LA')">LOS ANGELES</button>
    <button onclick="setCity('CHINA')">CHINA</button>
    <button onclick="setCity('INDIA')">INDIA</button>
  </div>

  <div id="sun" class="sun"></div>
  <div id="cloud" class="cloud"></div>
  <div id="rain" class="rain"></div>

  <div class="content">
    <div class="context">NEW YORK 24H</div>
    <div id="time" class="time">--:--:--</div>
  </div>

</div>

<script>
const API_KEY = "e90186db9f1f3b5c5ce6ec44d813d71";

const timeEl = document.getElementById("time");
const sunEl = document.getElementById("sun");
const rainEl = document.getElementById("rain");
const cloudEl = document.getElementById("cloud");

let currentCity = "NY";

const TIMEZONES = {
  NY: "America/New_York",
  SEOUL: "Asia/Seoul",
  LA: "America/Los_Angeles",
  CHINA: "Asia/Shanghai",
  INDIA: "Asia/Kolkata"
};

const CITY_NAMES = {
  NY: "New York",
  SEOUL: "Seoul",
  LA: "Los Angeles",
  CHINA: "Beijing",
  INDIA: "Delhi"
};

function setCity(city){
  currentCity = city;

  document.querySelectorAll(".city-toggle button").forEach(btn=>{
    btn.classList.remove("active");
  });

  document.querySelector(`button[onclick="setCity('${city}')"]`)
    .classList.add("active");

  fetchWeather();
  update();
}

function getTime(){
  return new Date(
    new Date().toLocaleString("en-US", {
      timeZone: TIMEZONES[currentCity]
    })
  );
}

function getSunIntensity(hour){
  if(hour < 6 || hour > 18) return 0;
  return 1 - Math.abs(hour - 12)/6;
}

async function fetchWeather(){
  try{
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${CITY_NAMES[currentCity]}&appid=${API_KEY}`
    );

    const data = await res.json();
    const type = data.weather[0].main;

    applyWeather(type);

  }catch(e){
    console.log(e);
  }
}

function applyWeather(type){
  rainEl.style.display = "none";
  cloudEl.style.opacity = 0;

  if(type.includes("Rain") || type.includes("Drizzle")){
    rainEl.style.display = "block";
    rainEl.innerHTML="";
    for(let i=0;i<80;i++){
      const d=document.createElement("div");
      d.style.left=Math.random()*100+"%";
      d.style.animationDuration=(0.5+Math.random())+"s";
      rainEl.appendChild(d);
    }
  }

  if(type.includes("Cloud")){
    cloudEl.style.opacity = 1;
  }
}

function pad(n){return String(n).padStart(2,"0");}

function update(){
  const t = getTime();
  const h = t.getHours();

  timeEl.textContent =
    `${pad(h)}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;

  sunEl.style.opacity = getSunIntensity(h);

  document.querySelector(".context").textContent =
    currentCity === "NY" ? "NEW YORK 24H" :
    currentCity === "SEOUL" ? "SEOUL 24H" :
    currentCity === "LA" ? "LOS ANGELES 24H" :
    currentCity === "CHINA" ? "CHINA 24H" :
    "INDIA 24H";
}

fetchWeather();
update();

setInterval(update,1000);
setInterval(fetchWeather,600000);
</script>

</body>
</html>
